<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #202124; display: flex; align-items: center; justify-content: center; min-height: 1080px; font-family: 'Inter', sans-serif; }
  .slide { width: 1920px; height: 1080px; background: linear-gradient(135deg, #202124 0%, #1a1a2e 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; position: relative; overflow: hidden; }
  .stat { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 180px; color: #34A853; opacity: 0; animation: fadeUp 0.8s ease forwards; }
  .stat-unit { font-size: 48px; color: #34A853; margin-left: 8px; }
  .subtitle { font-size: 48px; font-weight: 700; color: #fff; text-align: center; line-height: 1.3; margin-top: 24px; white-space: pre-line; opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards; }
  .comparison { display: flex; gap: 60px; margin-top: 60px; opacity: 0; animation: fadeUp 0.8s ease 0.5s forwards; }
  .vs-card { text-align: center; padding: 24px 40px; border-radius: 12px; }
  .vs-card.ole { background: #4285F420; border: 1px solid #4285F440; }
  .vs-card.other { background: #3c404320; border: 1px solid #5F636840; }
  .vs-label { font-size: 14px; color: #9aa0a6; text-transform: uppercase; letter-spacing: 2px; }
  .vs-time { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 72px; font-weight: 800; margin-top: 8px; }
  .vs-card.ole .vs-time { color: #34A853; }
  .vs-card.other .vs-time { color: #EA4335; }
  .vs-desc { font-size: 16px; color: #9aa0a6; margin-top: 4px; }
  .tagline { font-size: 20px; color: #5F6368; margin-top: 60px; letter-spacing: 3px; text-transform: uppercase; opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards; }
  .accent { position: absolute; bottom: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #4285F4, #34A853, #FBBC05, #EA4335); }
  .logo { position: absolute; top: 40px; left: 40px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 20px; color: #5F6368; letter-spacing: 3px; opacity: 0; animation: fadeUp 0.8s ease 0.1s forwards; }
  .vs { position: absolute; left: 50%; transform: translateX(-50%); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 28px; font-weight: 700; color: #5F6368; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
  .pulse { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, #34A85308 0%, transparent 70%); animation: pulse 4s ease-in-out infinite; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; } }
</style>
</head>
<body>
<div class="slide">
  <div class="pulse"></div>
  <div class="logo">ONLINE EVERYWHERE</div>
  <div class="stat">0.4<span class="stat-unit">s</span></div>
  <div class="subtitle">$0/month. 100% yours.</div>
  <div class="comparison">
    <div class="vs-card ole">
      <div class="vs-label">You (with OLE)</div>
      <div class="vs-time">0.4s</div>
      <div class="vs-desc">Hand-coded • Full ownership</div>
    </div>
    <div class="vs-card other">
      <div class="vs-label">DIY Builders</div>
      <div class="vs-time">3–6s</div>
      <div class="vs-desc">$29–79/mo • Template limits</div>
    </div>
  </div>
  <div class="tagline">Data-Driven Marketing, Accelerated by AI.</div>
  <div class="accent"></div>
</div>
</body>
</html>
