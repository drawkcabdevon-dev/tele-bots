<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #202124; display: flex; align-items: center; justify-content: center; min-height: 1080px; font-family: 'Inter', sans-serif; }
  .slide { width: 1920px; height: 1080px; background: linear-gradient(135deg, #202124 0%, #1a1a2e 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; position: relative; overflow: hidden; }
  .stat { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 200px; color: #4285F4; opacity: 0; animation: fadeUp 0.8s ease forwards; }
  .stat .decimal { color: #EA4335; }
  .subtitle { font-size: 48px; font-weight: 700; color: #fff; text-align: center; line-height: 1.3; margin-top: 24px; opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards; }
  .context { font-size: 24px; color: #9aa0a6; margin-top: 40px; max-width: 800px; text-align: center; line-height: 1.6; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }
  .tagline { font-size: 20px; color: #5F6368; margin-top: 60px; letter-spacing: 3px; text-transform: uppercase; opacity: 0; animation: fadeUp 0.8s ease 0.9s forwards; }
  .accent { position: absolute; bottom: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #4285F4, #34A853, #FBBC05, #EA4335); }
  .logo { position: absolute; top: 40px; left: 40px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 20px; color: #5F6368; letter-spacing: 3px; opacity: 0; animation: fadeUp 0.8s ease 0.1s forwards; }
  .bar-chart { display: flex; align-items: flex-end; gap: 12px; margin-top: 40px; height: 40px; opacity: 0; animation: fadeUp 0.8s ease 0.5s forwards; }
  .bar { height: 100%; border-radius: 4px; transition: width 1s ease; }
  .bar-red { width: 400px; background: #EA4335; }
  .bar-grey { width: 108px; background: #3c4043; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
  .pulse { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, #4285F408 0%, transparent 70%); animation: pulse 4s ease-in-out infinite; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; } }
</style>
</head>
<body>
<div class="slide">
  <div class="pulse"></div>
  <div class="logo">ONLINE EVERYWHERE</div>
  <div class="stat">78.7<span class="decimal">%</span></div>
  <div class="subtitle">of Barbados businesses<br>only exist on social media.</div>
  <div class="bar-chart">
    <div class="bar bar-red"></div>
    <div class="bar bar-grey"></div>
  </div>
  <div class="context">One algorithm change. One account suspension.<br>Your entire customer base — gone.</div>
  <div class="tagline">Data-Driven Marketing, Accelerated by AI.</div>
  <div class="accent"></div>
</div>
</body>
</html>
